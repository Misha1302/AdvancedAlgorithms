name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gcc-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DADVANCED_ALGORITHMS_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build -j2
      - name: Correctness tests
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build -L correctness --output-on-failure

  clang-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >-
          cmake -S . -B build-clang
          -DCMAKE_BUILD_TYPE=Release
          -DADVANCED_ALGORITHMS_ENABLE_SANITIZERS=OFF
      - name: Build
        run: cmake --build build-clang -j2
      - name: Correctness tests
        run: ctest --test-dir build-clang -L correctness --output-on-failure
